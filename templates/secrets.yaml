{{- if and .Values.existingSecret.enabled .Values.externalsecrets.enabled }}
{{- fail "existingSecret and externalsecrets cannot both be enabled. Choose one secret backend." }}
{{- end }}
{{- if and (not .Values.existingSecret.enabled) (not .Values.externalsecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "..fullname" . }}-postgresql-secret"
  annotations:
    labels:
        {{- include "..labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresql-password: {{ .Values.postgresql.auth.password }}
  postgresql-admin-password: {{ .Values.postgresql.auth.admin_password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "..fullname" . }}-odoo-conf"
  annotations:
    labels:
        {{- include "..labels" . | nindent 4 }}
type: Opaque
stringData:
  odoo.conf: |
{{ include "..odooConf" (dict "Values" .Values "dbPassword" .Values.postgresql.auth.password "adminPasswd" .Values.odoo.admin_passwd) | indent 4 }}
{{- end }}
