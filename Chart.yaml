---
apiVersion: v2
name: odoo
description: An opiniated Helm Chart for deploying Odoo
type: application
version: 1.0.0-gamma
appVersion: "18.0"
sources:
  - https://github.com/odoo/odoo
  - https://github.com/imio/helm-charts
  - https://github.com/imio/helm-odoo
icon: https://odoocdn.com/openerp_website/static/src/img/assets/png/odoo_logo_medium.png
maintainers:
  - name: IMIO
    url: https://github.com/IMIO/
dependencies:
  - name: postgresql
    alias: postgresql
    # Pinned to an exact version for reproducible builds (matches Chart.lock).
    # Bundled PostgreSQL is dev/test only — see the deprecation note in values.yaml.
    version: 14.3.3
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
