# Default values for odoo
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Odoo image
image:
  repository: odoo
  # Overrides the image tag whose default is the chart appVersion.
  tag: "18.0"
  # Pull policy can be set to Always, IfNotPresent, or Never
  # ref: https://kubernetes.io/docs/concepts/containers/images/#updating-images
  pullPolicy: IfNotPresent
  ## Optionally specify an imagePullSecret.
  ## Secret must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## pullSecret:

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

deployment:
  ## Odoo deployment strategy
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
  strategy: Recreate

# Nginx reverse proxy sidecar
nginx:
  image:
    repository: nginx
    tag: "1.29.8-alpine"
    ## Optionally specify an imagePullSecret.
    ## Secret must be manually created in the namespace.
    ## pullSecret:
  # Container-level securityContext for the nginx sidecar (and the maintenance-page
  # pods, which also run nginx). Stock nginx:alpine is designed to run with a ROOT
  # master that writes /var/cache/nginx + /run/nginx.pid and drops its workers to
  # the nginx user — so it is run as root here, but with every capability dropped
  # except the four nginx genuinely needs (these are still gated even for uid 0
  # once ALL is dropped): NET_BIND_SERVICE (bind :80), SETUID/SETGID (drop workers
  # to the nginx user) and CHOWN (chown the cache/temp dirs to that user).
  # This overrides the pod-level non-root securityContext for the nginx container.
  # To run fully non-root instead, switch the image to nginxinc/nginx-unprivileged
  # (listens on 8080) and adjust service.port / the container port accordingly.
  containerSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - CHOWN
        - SETGID
        - SETUID
        - NET_BIND_SERVICE
    seccompProfile:
      type: RuntimeDefault
    # readOnlyRootFilesystem left false: nginx writes to /var/cache/nginx and /run
  resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /healthz
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

# Odoo application configuration
odoo:
  # Database initialisation. When enabled, a Job runs as a Helm pre-install AND
  # pre-upgrade hook: its `prepare` initContainer scales any running Odoo/cron
  # to 0, it waits for the DB, then runs `odoo -i <modules> -d <db>
  # --stop-after-init` BEFORE the Odoo deployment is (re)applied — so Odoo never
  # starts against an uninitialised DB. Runs at a lower hook-weight than update,
  # so init completes first when both are enabled.
  # Treat `enabled` as a ONE-SHOT intent: set true to initialise on install, or
  # to re-initialise after trashing the DB (`helm upgrade` with init.enabled=true),
  # then set it back to false. Left on, every `helm upgrade` re-runs `odoo -i`
  # (a no-op on already-installed modules, but it scales Odoo to 0 meanwhile).
  init:
    enabled: false
    modules: base,web
  # Module/version update. When enabled, a Job runs as a Helm pre-install AND
  # pre-upgrade hook, at a HIGHER weight than init (so init runs first): its
  # `prepare` initContainer scales Odoo (and cron) to 0, it waits for the DB,
  # runs `odoo -u <modules> -d <db> --stop-after-init`, then Helm brings the
  # deployment back up with the new image. Set true only for a version bump —
  # leaving it on means downtime + migration on every upgrade. `odoo -u` needs
  # an already-initialised DB (use odoo.init for a brand-new database).
  update:
    enabled: false
    modules: all
    # Serve the maintenance page (via the existing maintenance nginx) while the
    # update/re-init migration runs. Requires ingress.enabled. Ignored if maintenance.enabled.
    maintenancePage: true
  # Shared settings for the init/update hook Jobs
  hooks:
    # Number of retries for the hook Job before it is marked failed
    backoffLimit: 1
    # Auto-clean finished hook Jobs after this many seconds
    ttlSecondsAfterFinished: 86400
    # init/update: block on the DB host:port (TCP) before running odoo
    waitForDb: true
    # Image used by the init/update hooks to scale the deployments down
    kubectlImage: "alpine/kubectl:1.36.1"
  server_wide_modules: base,web
  # admin_passwd: managed by external secrets
  proxy_mode: "True"
  workers: 2
  limit_memory_soft: 2147483648
  limit_memory_hard: 2684354560
  limit_request: 65536
  limit_time_cpu: 60
  limit_time_real: 120
  limit_time_real_cron: -1
  list_db: "False"
  addons_path: /mnt/extra-addons
  smtp_server: ""
  load_language: en_US
  without_demo: all
  # dbfilter is used to filter the databases that the user can see in a multi-tenant setup
  # dbfilter should be false if you are not using a multi-tenant setup
  # and you need to setup the postgresql.auth.database to the name of the database.
  dbfilter: false
  # db_name should be False if you are using a multi-tenant setup
  db_name: odoo
  db_maxconn: 64
  db_replica_host: ""
  db_replica_port: 5432
  # Number of cron threads on the main Odoo instance (set to 0 automatically when cron.enabled is true)
  max_cron_threads: 2
  log_level: info
  log_handler: ":INFO"

# Dedicated cron deployment (optional)
cron:
  enabled: false
  replicaCount: 1
  # Recreate prevents two cron instances running simultaneously during updates
  strategy: Recreate
  # Number of cron threads on the dedicated cron deployment
  max_cron_threads: 2
  workers: 2
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  # Extra init containers to run before the cron container starts
  extraInitContainers: []
  # Extra sidecar containers to add to the cron pod
  extraContainers: []
  # Extra volumes to mount in the cron pod
  extraVolumes: []
  # Extra volume mounts for the cron container
  extraVolumeMounts: []
  livenessProbe:
    httpGet:
      port: odoo-http
      path: /web/health
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

# Scheduled deployment rollout restart (optional).
# Renders a CronJob (+ its own ServiceAccount/Role/RoleBinding,
# <fullname>-rollout-restart) that runs `kubectl rollout restart` + `kubectl
# rollout status` against the Odoo (and cron) deployment(s) on a schedule, to
# periodically recycle the pods. The Role grants get/list/watch/patch on
# deployments in the release namespace.
rolloutRestart:
  enabled: false
  # Cron schedule (cluster timezone / UTC). Default: weekly, Sunday 03:00.
  schedule: "0 3 * * 0"
  # Deployments to restart. When empty, defaults to the main Odoo deployment
  # (<fullname>) plus <fullname>-cron when cron.enabled. Set explicit names to override.
  targets: []
  # Image used to run kubectl. Defaults to odoo.hooks.kubectlImage.
  image: ""
  imagePullPolicy: IfNotPresent
  # Timeout passed to `kubectl rollout status`.
  timeout: 300s
  # Forbid overlapping runs.
  concurrencyPolicy: Forbid
  backoffLimit: 2
  activeDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  restartPolicy: Never
  resources: {}

# Connection settings for an EXTERNAL PostgreSQL database.
# Used ONLY when postgresql.enabled is false. When the bundled chart is
# enabled, connection settings come from the postgresql.* section below instead.
externalDatabase:
  ## Hostname of the external PostgreSQL server (e.g. a CloudNativePG service).
  ## REQUIRED when postgresql.enabled is false.
  host: ""
  port: 5432
  ## Database name. Set odoo.db_name: false for a multi-tenant (dbfilter) setup.
  name: odoo
  user: odoo
  ## Password Odoo uses to connect. With the default (generated) secret backend
  ## this is written into odoo.conf. Use existingSecret/externalsecrets to keep
  ## it out of plaintext values.
  password: mySecuredPassword

# Bundled PostgreSQL (CloudPirates `postgres` subchart) — DEV/TEST ONLY.
# A maintained community chart running the official docker.io/postgres image,
# aliased to "postgresql" in Chart.yaml (so this key and the <release>-postgresql
# resource names are preserved). Set enabled: false to use an external database
# (configure externalDatabase above). Do NOT run the bundled DB in production —
# use an external, managed PostgreSQL (e.g. CloudNativePG) instead.
## ref: https://github.com/CloudPirates-io/helm-charts/tree/main/charts/postgres
postgresql:
  enabled: true
  # The Odoo init/update hooks run at pre-install and wait for the DB. Helm has
  # no way to deploy a subchart before the parent's pre-install hooks, so run
  # the bundled PostgreSQL as a pre-install hook itself (lower weight than the
  # init hook at 0) — Helm waits for it Ready first. Dev/test only; pairs with
  # the ephemeral storage below. Production should use an external DB instead
  # (postgresql.enabled: false + externalDatabase.*).
  commonAnnotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-20"
  image:
    # PostgreSQL 17 (latest 17.x), digest-pinned. The CloudPirates chart defaults
    # to PG 18; we pin the tag to the official postgres:17.x image + its manifest
    # digest. Bump both together to move to a newer 17.x.
    tag: "17.10@sha256:ebba4f4de37f08f138f97c1443c987a435e783177afedcc4aaf2da1930fbc37a"
    imagePullPolicy: IfNotPresent
  auth:
    # username/password/database configure the SUPERUSER created at init (this
    # chart has no separate postgresPassword; the named user IS the superuser and
    # gets a same-named database). Odoo connects as this user.
    # Set database as false for a multi-tenant setup (dbfilter in the odoo section).
    username: odoo
    password: mySecuredPassword
    database: odoo
    # To supply the password from an existing secret instead of the inline value
    # above (e.g. the externalsecrets bundled secret <fullname>-postgresql-secret),
    # uncomment and point at it (default key: postgres-password):
    # existingSecret: my-db-secret
    # secretKeys:
    #   adminPasswordKey: postgres-password
  persistence:
    enabled: false

# Use an existing secret for the Odoo configuration instead of generating one
existingSecret:
  enabled: false

# Use external-secrets.io for Odoo configuration instead of generating one.
# Works with odoo.init/odoo.update: the ExternalSecret is rendered as a
# pre-install/pre-upgrade hook so the operator syncs the odoo.conf secret during
# the pre-install phase; the hook Job's mount then retries until it appears (the
# operator must sync within helm --timeout).
externalsecrets:
  enabled: false
  secretStoreRef:
    name: vault-backend
  # Vault key holding the PostgreSQL password. It is the DEFAULT source for the DB
  # password written into odoo.conf — so the password lives in Vault ONCE and is
  # shared instead of being duplicated under odooKey. It also feeds the bundled
  # <fullname>-postgresql-secret ExternalSecret; to have the bundled DB consume it,
  # set postgresql.auth.existingSecret: <fullname>-postgresql-secret and
  # auth.secretKeys.adminPasswordKey: postgresql-password (the CloudPirates chart
  # has a single superuser password, so the admin-password entry below is unused
  # unless you point a credential at it).
  postgresqlKey:
  # Vault key holding Odoo's own secrets (the master admin_passwd).
  odooKey:
  # Remote key/property names looked up inside the Vault keys above. Override these
  # to match your backend's secret layout.
  properties:
    postgresql:                          # properties looked up inside postgresqlKey
      password: postgresql-password
      adminPassword: postgresql-admin-password
    odoo:                                # credentials written into odoo.conf
      # DB password (odoo.conf db_password). Each credential picks its own Vault key:
      # key "" -> postgresqlKey (falls back to odooKey when postgresqlKey is unset,
      # e.g. an external DB). Set key explicitly to read it from any other key.
      postgresqlPassword:
        key: ""
        property: postgresql-password
      # Odoo master password (odoo.conf admin_passwd). key "" -> odooKey.
      adminPasswd:
        key: ""
        property: odoo-admin-passwd

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  storageClass: "openebs-zfs-retain"
  size: 10Gi
  # Name of an existing claim
  # existingClaim:

service:
  type: ClusterIP
  port: 80

# Prometheus Operator ServiceMonitor for scraping Odoo metrics.
# Disabled by default. Requires the Prometheus Operator CRDs
# (monitoring.coreos.com/v1) to be present in the cluster and an Odoo endpoint
# that serves metrics at `path` on the named `port` (e.g. a metrics-exporting
# Odoo module). Selects the `component: server` Odoo Service on `odoo-http`; the
# cron Service is excluded.
serviceMonitor:
  enabled: false
  # Extra labels for the ServiceMonitor. Prometheus Operator commonly requires a
  # `release:` label matching its serviceMonitorSelector, e.g.:
  #   labels:
  #     release: kube-prometheus-stack
  labels: {}
  # Extra annotations for the ServiceMonitor.
  annotations: {}
  # Service port NAME to scrape (must match a port on the Odoo Service).
  port: odoo-http
  # HTTP path exposing Prometheus metrics.
  path: /metrics
  # Scrape interval.
  interval: 30s
  # Scrape scheme (http or https).
  scheme: http
  # Optional per-scrape timeout (e.g. "10s"). Empty = operator default.
  scrapeTimeout: ""
  # Optional Prometheus relabeling applied before scraping.
  relabelings: []
  # Optional Prometheus relabeling applied to scraped metrics.
  metricRelabelings: []

ingress:
  enabled: false
  className: "public"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: odoo.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
  - secretName: odoo-tls-secret
    hosts:
      - odoo.example.com

# Resources for the Odoo container
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

## Configure liveness and readiness probes for the Odoo container
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
livenessProbe:
  httpGet:
    port: odoo-http
    path: /web/health
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  httpGet:
    port: odoo-http
    path: /web/health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

# startupProbe:
#   path: /web/health
#   initialDelaySeconds: 180
#   periodSeconds: 10
#   timeoutSeconds: 5
#   failureThreshold: 6
#   successThreshold: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional environment variables for the Odoo container
# Also injected into the init/update hook Jobs (odoo.init / odoo.update)
# extraEnv:

# Additional environment variables from secrets or configmaps
# Also injected into the init/update hook Jobs (odoo.init / odoo.update)
# extraEnvFrom:

# Extra init containers
# Also injected into the init/update hook Jobs (odoo.init / odoo.update)
# extraInitContainers: []

# Extra sidecar containers to add to the main Odoo pod
# Useful for adding sidecars like Celery workers, log shippers, etc.
# Each entry is a full Kubernetes container spec.
# extraContainers: []

# Extra volumes
# Also injected into the init/update hook Jobs (odoo.init / odoo.update)
# extraVolumes: []

# Extra volume mounts for the Odoo container
# Also injected into the init/update hook Jobs (odoo.init / odoo.update)
# extraVolumeMounts: []

podAnnotations: {}

# ServiceAccount for the Odoo / cron / maintenance pods. The API token is not
# mounted by default — these pods never talk to the Kubernetes API. (The
# init/update hook Jobs use their own `<release>-hook` ServiceAccount, created in
# templates/hooks/rbac.yaml, which DOES need API access to scale deployments.)
serviceAccount:
  create: true
  # If name is empty and create is true, the fullname is used.
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# Pod-level securityContext (applied to the Odoo, cron and hook Job pods).
# Note: Helm convention usually calls this `podSecurityContext`; the chart keeps
# the name `securityContext` to avoid breaking existing overrides. In the official
# Odoo image the `odoo` user is uid 100, gid 101, so these are safe non-root
# defaults (the nginx sidecar overrides them — see nginx.containerSecurityContext).
securityContext:
  fsGroup: 101
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 101
  seccompProfile:
    type: RuntimeDefault

# Container-level securityContext for the Odoo and cron containers (and the
# init/update hook containers). runAsUser 100 = the `odoo` user in the official
# image (must be set numerically: the image's USER is the name "odoo", which
# runAsNonRoot cannot verify on its own, and the uid must exist in /etc/passwd or
# Odoo's getpwuid() check fails). readOnlyRootFilesystem is left false because
# Odoo writes to /var/lib/odoo (filestore/sessions) and /tmp.
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 100
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}

tolerations: []

affinity: {}

# Enable maintenance mode
# NOTE: this only scales Odoo/cron to 0 and shows the maintenance page. It does NOT
# disable the odoo.init/odoo.update hook Jobs — those still run on install/upgrade (so
# you can migrate behind the maintenance page). For a DB restore, keep those flags false.
maintenance:
  enabled: false
  ## You can add a signature to the maintenance page
  ## If you are using customTemplate, you can call the signature in your configmap with
  ## {{ .Values.maintenance.signature }}
  signature: ""
  name: "Odoo"
  customTemplate:
    ## Name of the configmap containing the custom template
    name: ""
    ## Name of the key in the configmap containing the custom template
    ## Must end with its extension (.html, .txt, etc.)
    htmlKey: ""
