# Default values for odoo
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Odoo image
image:
  repository: odoo
  # Overrides the image tag whose default is the chart appVersion.
  tag: "19.0"
  # Pull policy can be set to Always, IfNotPresent, or Never
  # ref: https://kubernetes.io/docs/concepts/containers/images/#updating-images
  pullPolicy: IfNotPresent
  ## Optionally specify an imagePullSecret.
  ## Secret must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## pullSecret:

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

deployment:
  ## Odoo deployment strategy
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
  strategy: Recreate

# Nginx reverse proxy sidecar
nginx:
  image:
    repository: nginx
    tag: "1.29.8-alpine"
    ## Optionally specify an imagePullSecret.
    ## Secret must be manually created in the namespace.
    ## pullSecret:
  resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

# Odoo application configuration
odoo:
  init:
    enabled: false
    modules: base,web
  update:
    enabled: true
    modules: all
  server_wide_modules: base,web
  # admin_passwd: managed by external secrets
  proxy_mode: "True"
  workers: 2
  limit_memory_soft: 2147483648
  limit_memory_hard: 2684354560
  limit_request: 65536
  limit_time_cpu: 60
  limit_time_real: 120
  limit_time_real_cron: -1
  list_db: "False"
  addons_path: /mnt/extra-addons
  smtp_server: ""
  load_language: en_US
  without_demo: all
  # dbfilter is used to filter the databases that the user can see in a multi-tenant setup
  # dbfilter should be false if you are not using a multi-tenant setup
  # and you need to setup the postgresql.auth.database to the name of the database.
  dbfilter: false
  # db_name should be False if you are using a multi-tenant setup
  db_name: odoo
  db_maxconn: 64
  db_replica_host: ""
  db_replica_port: 5432
  # Number of cron threads on the main Odoo instance (set to 0 automatically when cron.enabled is true)
  max_cron_threads: 2
  log_level: info
  log_handler: ":INFO"

# Dedicated cron deployment (optional)
cron:
  enabled: false
  replicaCount: 1
  # Recreate prevents two cron instances running simultaneously during updates
  strategy: Recreate
  # Number of cron threads on the dedicated cron deployment
  max_cron_threads: 2
  workers: 2
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  livenessProbe:
    httpGet:
      port: odoo-http
      path: /web/health
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

postgresql:
  ## If true, install the Postgresql chart
  ## ref: https://github.com/bitnami/charts/blob/master/bitnami/postgresql/values.yaml
  ## If false, use an external postgresql database
  enabled: true
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamilegacy/postgresql
  auth:
    # Database name should be set as false if you are using a multi-tenant setup
    # In this case, we are using the dbfilter option in the odoo section
    database: odoo
    username: odoo
    # password: managed by a Kubernetes secret, you could use existing one
    password: mySecuredPassword
    admin_password: mySecuredPassword
    existingSecret: odoo-postgresql-secret
    secretKeys:
      adminPasswordKey: postgresql-admin-password
      userPasswordKey: postgresql-password
  ## host of the external postgresql database
  host: "odoo-postgresql"
  port: 5432
  primary:
    persistence:
      enabled: false

# Use an existing secret for the Odoo configuration instead of generating one
existingSecret:
  enabled: false

# Use external-secrets.io for Odoo configuration instead of generating one
externalsecrets:
  enabled: false
  secretStoreRef:
    name: vault-backend
  postgresqlKey:
  odooKey:

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  storageClass: "openebs-zfs-retain"
  size: 10Gi
  # Name of an existing claim
  # existingClaim:

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: "public"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: odoo.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
  - secretName: odoo-tls-secret
    hosts:
      - odoo.example.com

# Resources for the Odoo container
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

## Configure liveness and readiness probes for the Odoo container
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
livenessProbe:
  httpGet:
    port: odoo-http
    path: /web/health
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  httpGet:
    port: odoo-http
    path: /web/health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

# startupProbe:
#   path: /web/health
#   initialDelaySeconds: 180
#   periodSeconds: 10
#   timeoutSeconds: 5
#   failureThreshold: 6
#   successThreshold: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional environment variables for the Odoo container
# extraEnv:

# Additional environment variables from secrets or configmaps
# extraEnvFrom:

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

statefulSetSecurityAnnotations: {}

securityContext:
  fsGroup: 101
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

nodeSelector: {}

tolerations: []

affinity: {}

# Enable maintenance mode
maintenance:
  enabled: false
  ## You can add a signature to the maintenance page
  ## If you are using customTemplate, you can call the signature in your configmap with
  ## {{ .Values.maintenance.signature }}
  signature: ""
  name: "Odoo"
  customTemplate:
    ## Name of the configmap containing the custom template
    name: ""
    ## Name of the key in the configmap containing the custom template
    ## Must end with its extension (.html, .txt, etc.)
    htmlKey: ""
