---
# Default values for local testing
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: odoo
  tag: "19.0"
  pullPolicy: IfNotPresent
  ## Optionally specify an imagePullSecret.
  ## Secret must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  # pullSecret:

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

deployment:
  strategy: Recreate

nginx:
  image:
    repository: nginx
    tag: "1.29.8-alpine"
  resources: {}
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

odoo:
  init:
    enabled: true
    modules: base,web
  update:
    enabled: true
    modules: all
  server_wide_modules: base,web
  admin_passwd: "mySecuredPassword"
  proxy_mode: "True"
  workers: 2
  limit_memory_soft: 2147483648
  limit_memory_hard: 2684354560
  limit_request: 65536
  limit_time_cpu: 60
  limit_time_real: 120
  limit_time_real_cron: -1
  list_db: "False"
  addons_path: /mnt/extra-addons
  smtp_server: ""
  load_language: en_US
  without_demo: all
  dbfilter: false
  db_name: odoo
  db_maxconn: 64
  db_replica_host: ""
  db_replica_port: 5432
  max_cron_threads: 2
  log_level: info
  log_handler: ":INFO"

cron:
  enabled: false
  replicaCount: 1
  strategy: Recreate
  max_cron_threads: 2
  workers: 2
  resources: {}
  extraEnv: []
  extraEnvFrom: []
  livenessProbe:
    httpGet:
      port: odoo-http
      path: /web/health
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

postgresql:
  ## If true, install the Postgresql chart
  ## ref: https://github.com/bitnami/charts/blob/master/bitnami/postgresql/values.yaml
  ## If false, use an external postgresql database
  enabled: true
  auth:
    # Seems hardcoded: https://github.com/odoo/docker/blob/master/16.0/wait-for-psql.py#L21C5-L21C5
    # Database name should be false if you are using a multi-tenant setup
    # In this case, we are using the dbfilter option in the odoo section
    database: odoo
    username: odoo
    password: mySecuredPassword
    admin_password: mySecuredPassword
    existingSecret: odoo-postgresql-secret
    secretKeys:
      adminPasswordKey: postgresql-admin-password
      userPasswordKey: postgresql-password
  ## host of the external postgresql database
  # external: "10.7.121.11"
  host: "odoo-postgresql"
  port: 5432
  primary:
    persistence:
      enabled: false

# Use an existing secret for the Odoo configuration instead of generating one
existingSecret:
  enabled: false

# Use external-secrets.io for Odoo configuration instead of generating one
externalsecrets:
  enabled: false
  secretStoreRef:
    name: vault-backend
  postgresqlKey:
  odooKey:

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  storageClass: "standard"
  size: 5Gi

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  # className: "public"
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: odoo.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: odoo-local-tls
      hosts:
        - odoo.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

## Configure liveness and readiness probes for the Odoo container
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
livenessProbe:
  httpGet:
    port: odoo-http
    path: /web/health
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  httpGet:
    port: odoo-http
    path: /web/health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

# startupProbe:
#   path: /web/health
#   initialDelaySeconds: 300
#   periodSeconds: 10
#   timeoutSeconds: 5
#   failureThreshold: 6
#   successThreshold: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

extraEnv:
  - name: "TEST"
    value: "test"

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

statefulSetSecurityAnnotations: {}

securityContext:
  fsGroup: 101
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

nodeSelector: {}

tolerations: []

affinity: {}

# Enable maintenance mode
maintenance:
  enabled: false
  signature: ""
  name: "Odoo"
  customTemplate:
    name: ""
    htmlKey: ""
